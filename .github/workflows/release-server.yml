name: Release server to npm

on:
  push:
    tags:
      - 'server-v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies (root workspaces)
        working-directory: .
        run: npm ci

      - name: Build core (dev dependency of server)
        working-directory: .
        run: npm run build

      - name: Validate tag matches server package version
        id: version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED="server-v${PACKAGE_VERSION}"
          if [[ "${GITHUB_REF_NAME}" != "${EXPECTED}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match server package version (${EXPECTED})" >&2
            exit 1
          fi
          echo "package_version=${PACKAGE_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Check
        run: npm run check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack
        id: pack
        shell: bash
        run: |
          PACKAGE_TGZ="$(npm pack)"
          echo "package_tgz=${PACKAGE_TGZ}" >> "${GITHUB_OUTPUT}"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Create GitHub release
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" "server/${{ steps.pack.outputs.package_tgz }}" --generate-notes --title "parallel-mcp-server ${{ steps.pack.outputs.package_tgz }}"

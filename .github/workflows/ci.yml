name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build core (required before server typecheck)
        run: npm run build

      - name: Typecheck (all workspaces)
        run: npm run check

      - name: Test core
        run: npm test

      - name: Test server
        run: npm run test:server

      - name: Build server
        run: npm run build:server

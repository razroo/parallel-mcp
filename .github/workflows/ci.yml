name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build core (required before server typecheck)
        run: npm run build

      - name: Typecheck (all workspaces)
        run: npm run check

      - name: Test core
        run: npm test

      - name: Test server
        run: npm run test:server

      - name: Test testkit (conformance suite against reference adapter)
        run: npm run test:testkit

      - name: Build server
        run: npm run build:server

      - name: Build testkit
        run: npm run build:testkit

  compat-sqlite:
    name: better-sqlite3 compat floor (v${{ matrix.better-sqlite3 }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ['22']
        better-sqlite3: ['11.10.0', '12.9.0']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install base dependencies
        run: npm ci

      - name: Pin better-sqlite3 to ${{ matrix.better-sqlite3 }}
        run: npm install better-sqlite3@${{ matrix.better-sqlite3 }} --no-save --workspaces=false

      - name: Build core
        run: npm run build

      - name: Typecheck
        run: npm run check

      - name: Test core
        run: npm test

      - name: Test server
        run: npm run test:server

      - name: Test testkit
        run: npm run test:testkit
